<!--
  Polished mountain-climb custom infographic.
  Use as the svg_inline value in a custom infographic spec.
  Required groups: basecamp, midcamp, summit (or rename + update data-group attrs).

  Design principles applied:
    - Atmospheric sky gradient + horizon haze for depth
    - 3-layer mountain (back range, mid range, foreground peak) for parallax
    - Snow cap on summit
    - Climbing path as Bezier curve with progress-stroke fill (gradient stroke)
    - Camp "stations" as concentric ring + glowing inner circle + label pill
    - Summit visually heaviest (larger, gold accent, halo)
    - All colors via CSS variables — theme-aware
-->
<defs>
  <!-- Sky gradient: warm horizon → cool zenith -->
  <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="var(--surface)"   stop-opacity="0"/>
    <stop offset="60%" stop-color="var(--accent-soft)" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="var(--purple-bg)" stop-opacity="0.5"/>
  </linearGradient>
  <!-- Distant range: pale, hazy -->
  <linearGradient id="rangeGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="var(--text-subtle)" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="var(--text-subtle)" stop-opacity="0.05"/>
  </linearGradient>
  <!-- Foreground peak: darker, sharper -->
  <linearGradient id="peakGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="var(--text-muted)" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="var(--text-muted)" stop-opacity="0.35"/>
  </linearGradient>
  <!-- Snow cap -->
  <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"  stop-color="var(--surface)" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="var(--surface)" stop-opacity="0.5"/>
  </linearGradient>
  <!-- Trail progress: gradient from accent → purple at the top -->
  <linearGradient id="trailGrad" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%"  stop-color="var(--accent)"/>
    <stop offset="100%" stop-color="var(--purple)"/>
  </linearGradient>
  <!-- Camp station glow filter -->
  <filter id="stationGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <!-- Summit halo -->
  <radialGradient id="summitHalo">
    <stop offset="0%"   stop-color="var(--accent)" stop-opacity="0.45"/>
    <stop offset="60%"  stop-color="var(--accent)" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- 1. SKY ATMOSPHERE — full canvas wash -->
<rect x="0" y="0" width="1200" height="400" fill="url(#skyGrad)"/>

<!-- 2. DISTANT MOUNTAIN RANGE (background, hazier) -->
<path d="M 0,300 L 150,180 L 280,240 L 420,160 L 560,210 L 720,150 L 880,200 L 1050,170 L 1200,220 L 1200,400 L 0,400 Z"
      fill="url(#rangeGrad)" stroke="none"/>

<!-- 3. SUMMIT HALO — drawn before the peak so it sits behind -->
<circle cx="950" cy="80" r="120" fill="url(#summitHalo)"/>

<!-- 4. FOREGROUND PEAK (the mountain we're climbing) -->
<polygon points="200,360 950,80 1100,360"
         fill="url(#peakGrad)"
         stroke="var(--border-strong)"
         stroke-width="1.5"
         stroke-linejoin="round"/>

<!-- 5. SNOW CAP -->
<polygon points="900,120 950,80 1000,120 970,150 930,150"
         fill="url(#snowGrad)"
         stroke="var(--surface)"
         stroke-width="0.5"/>

<!-- 6. CLIMBING TRAIL — Bezier path from basecamp to summit
     Background "ghost" trail (always visible) -->
<path id="trail-ghost"
      d="M 285,330 C 380,310 450,260 520,250 S 650,270 700,210 S 820,190 880,140 S 920,110 945,85"
      fill="none"
      stroke="var(--border-strong)"
      stroke-width="3"
      stroke-linecap="round"
      stroke-dasharray="2 4"
      opacity="0.4"/>
<!-- Foreground "filled" trail — uses progress-stroke binding for ALL items, gradient stroke -->
<path id="trail-progress"
      data-group="all"
      data-render="progress-stroke"
      data-path-length="800"
      d="M 285,330 C 380,310 450,260 520,250 S 650,270 700,210 S 820,190 880,140 S 920,110 945,85"
      fill="none"
      stroke="url(#trailGrad)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-dasharray="0 800"
      style="filter: drop-shadow(0 0 4px var(--accent));"/>

<!-- 7. CAMP STATIONS — concentric ring + glowing inner circle + labeled -->
<!-- Basecamp -->
<g transform="translate(285, 330)">
  <circle r="22" fill="var(--surface)" stroke="var(--border-strong)" stroke-width="1.5"/>
  <circle data-group="basecamp" data-render="status-class" r="14"
          fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>
  <circle data-group="basecamp" data-render="opacity" data-base-opacity="1"
          r="8" fill="var(--accent)" opacity="0.3"
          style="filter: url(#stationGlow);"/>
</g>
<!-- Basecamp label pill -->
<g transform="translate(285, 372)">
  <rect x="-44" y="-12" width="88" height="22" rx="11"
        fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
  <text x="0" y="3" text-anchor="middle"
        font-family="var(--font-sans)" font-size="11" font-weight="700" fill="var(--text)">Basecamp</text>
</g>
<text data-group="basecamp" data-render="count" x="285" y="395" text-anchor="middle"
      font-family="var(--font-mono)" font-size="10.5" fill="var(--text-muted)" font-weight="700">0 of 0</text>

<!-- Midcamp -->
<g transform="translate(700, 210)">
  <circle r="22" fill="var(--surface)" stroke="var(--border-strong)" stroke-width="1.5"/>
  <circle data-group="midcamp" data-render="status-class" r="14"
          fill="var(--accent-soft)" stroke="var(--accent)" stroke-width="1.5"/>
  <circle data-group="midcamp" data-render="opacity" data-base-opacity="1"
          r="8" fill="var(--accent)" opacity="0.3"
          style="filter: url(#stationGlow);"/>
</g>
<g transform="translate(700, 252)">
  <rect x="-40" y="-12" width="80" height="22" rx="11"
        fill="var(--surface)" stroke="var(--border)" stroke-width="1"/>
  <text x="0" y="3" text-anchor="middle"
        font-family="var(--font-sans)" font-size="11" font-weight="700" fill="var(--text)">Midcamp</text>
</g>
<text data-group="midcamp" data-render="percent" x="700" y="275" text-anchor="middle"
      font-family="var(--font-mono)" font-size="10.5" fill="var(--text-muted)" font-weight="700">0%</text>

<!-- Summit (visually heaviest) -->
<g transform="translate(945, 85)">
  <!-- Outer halo ring -->
  <circle r="38" fill="none" stroke="var(--accent)" stroke-width="1" opacity="0.25"/>
  <circle r="30" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
  <circle data-group="summit" data-render="status-class" r="20"
          fill="var(--accent-soft)" stroke="var(--accent-dark)" stroke-width="2"/>
  <circle data-group="summit" data-render="opacity" data-base-opacity="1"
          r="12" fill="var(--accent)" opacity="0.3"
          style="filter: url(#stationGlow);"/>
  <!-- Flag icon at summit -->
  <path d="M 0,-10 L 0,10 M 0,-10 L 8,-7 L 0,-4"
        stroke="var(--surface)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
</g>
<g transform="translate(945, 145)">
  <rect x="-40" y="-13" width="80" height="24" rx="12"
        fill="var(--accent)" stroke="var(--accent-dark)" stroke-width="1.5"/>
  <text x="0" y="3" text-anchor="middle"
        font-family="var(--font-sans)" font-size="12" font-weight="800" fill="white" letter-spacing="0.04em">SUMMIT</text>
</g>
<text data-group="summit" data-render="count" x="945" y="170" text-anchor="middle"
      font-family="var(--font-mono)" font-size="10.5" fill="var(--text-muted)" font-weight="700">0 of 0</text>

<!-- 8. ALTITUDE / NARRATIVE LABELS along the right edge -->
<g transform="translate(1140, 80)" opacity="0.7">
  <text font-family="var(--font-mono)" font-size="9" fill="var(--text-subtle)" font-weight="700" letter-spacing="0.1em" text-anchor="end">8,848m</text>
</g>
<g transform="translate(1140, 210)" opacity="0.7">
  <text font-family="var(--font-mono)" font-size="9" fill="var(--text-subtle)" font-weight="700" letter-spacing="0.1em" text-anchor="end">5,200m</text>
</g>
<g transform="translate(1140, 330)" opacity="0.7">
  <text font-family="var(--font-mono)" font-size="9" fill="var(--text-subtle)" font-weight="700" letter-spacing="0.1em" text-anchor="end">2,800m</text>
</g>
